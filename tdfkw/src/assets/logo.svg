<svg id="logo-svg" width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- 渐变定义 -->
                <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"></stop>
                    <stop offset="100%" style="stop-color:#334155;stop-opacity:1"></stop>
                </linearGradient>
                
                <!-- 强调色渐变 -->
                <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"></stop>
                    <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1"></stop>
                </linearGradient>

                <!-- 阴影滤镜 -->
                <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                    <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.2"></feDropShadow>
                </filter>
            </defs>

            <!-- 透明背景层 -->
            <rect width="500" height="200" fill="transparent"></rect>

            <!-- 字母组合 -->
            <g filter="url(#shadow)" font-family="'Inter', sans-serif" font-weight="900" font-size="85" letter-spacing="-4">
                <text x="35" y="130" fill="url(#brandGradient)">T</text>
                <text x="100" y="130" fill="url(#brandGradient)">D</text>
                <text x="180" y="130" fill="url(#brandGradient)">F</text>
                <text x="245" y="130" fill="url(#brandGradient)">K</text>
                <text x="325" y="130" fill="url(#brandGradient)">W</text>
            </g>

            <!-- 底部线条 -->
            <rect x="37" y="145" width="426" height="8" rx="4" fill="url(#accentGradient)"></rect>
            
            <!-- 放大后的装饰点 (半径从 5 增加到 12) -->
            <circle cx="451" cy="115" r="12" fill="#3b82f6"></circle>
        </svg>